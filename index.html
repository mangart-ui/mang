<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mang</title>
    <link rel="icon" href="favicon.png">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2=family=DotGothic16&family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --color-1: #ff007f;
            --color-2: #7f00ff;
            --color-3: #00f0ff;
            --accent-glow: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 배경 슬라이드쇼 레이어 */
        .bg-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .bg-animate {
            animation: kenBurns 40s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.02) translate(0%, 0%) rotate(0deg); }
            100% { transform: scale(1.12) translate(-2%, -1%) rotate(0.5deg); }
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(5, 5, 5, 0.5) 0%,
                rgba(10, 5, 15, 0.7) 50%,
                rgba(5, 5, 5, 0.9) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        /* 🎴 [수정] 메인 콘텐츠 카드 박스 크기 확대 */
        .content {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 540px; /* 기존 440px에서 540px로 묵직하게 키웠습니다 */
            padding: 46px 36px; /* 내부 여백도 더 넓혀서 시원한 느낌을 줍니다 */
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
        }

        .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 76px; /* 박스가 커진 만큼 폰트 크기도 68px -> 76px로 확대 */
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 30%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .bio {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #888888;
            margin-bottom: 48px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* 🔗 [수정] 박스 크기에 맞춰 터치하기 좋게 버튼 여백 및 크기 확대 */
        .nav-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px; /* 상하좌우 패딩을 늘려 버튼을 더 큼직하게 만들었습니다 */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 16px; /* 버튼 글씨 크기도 15px -> 16px로 업 */
            font-weight: 500;
            letter-spacing: 0.5px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--color-1), var(--color-2), var(--color-3));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .nav-btn:hover {
            color: #ffffff;
            border-color: transparent;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 28px rgba(127, 0, 255, 0.25);
        }

        .nav-btn:hover::before {
            opacity: 0.15;
        }

        .nav-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        .nav-btn span:last-child {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            opacity: 0.4;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn:hover span:last-child {
            opacity: 1;
            color: var(--color-3);
            transform: translateX(6px);
        }

        @media (max-width: 480px) {
            .content {
                padding: 38px 24px;
                margin: 0 16px;
            }
            .name {
                font-size: 58px;
            }
            .bio {
                font-size: 11px;
                margin-bottom: 36px;
            }
            .nav-btn {
                padding: 18px 24px;
                font-size: 15px;
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-layer bg-animate active" id="bg1"></div>
    <div class="bg-layer bg-animate" id="bg2"></div>
    <div class="bg-overlay"></div>
    <div class="bg-glow"></div>

    <div class="content">
        <h1 class="name">mang</h1>
        <p class="bio">character illustrator</p>

        <div class="nav">
            <!-- 🔗 [수정] X (Twitter) 부분에 실제 트위터 연결용 테스트 링크 주소를 심었습니다! -->
            <a href="https://x.com/KRIMP1723322" class="nav-btn" target="_blank">
                <span>X (Twitter)</span>
                <span>→</span>
            </a>
            
            <!-- 아래 남은 채널들은 나중에 주소가 나오면 # 자리에 주소를 쏙 채우시면 됩니다 -->
            <a href="#" class="nav-btn" target="_blank">
                <span>Pixiv</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>Commission</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>YouTube</span>
                <span>→</span>
            </a>
            <a href="#" class="nav-btn" target="_blank">
                <span>Instagram</span>
                <span>→</span>
            </a>
        </div>
    </div>

    <script>
        const images = [
            'https://picsum.photos',
            'https://picsum.photos',
            'https://picsum.photos'
        ];

        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        
        let currentIndex = 0;
        let isBg1Active = true;

        bg1.style.backgroundImage = `url('${images[0]}')`;
        if(images.length > 1) {
            bg2.style.backgroundImage = `url('${images[0]}')`;
        }

        function startSlideshow() {
            if (images.length <= 1) return;

            setInterval(() => {
                currentIndex = (currentIndex + 1) % images.length;

                if (isBg1Active) {
                    bg2.style.backgroundImage = `url('${images[currentIndex]}')`;
                    bg2.classList.add('active');
                    bg1.classList.remove('active');
                } else {
                    bg1.style.backgroundImage = `url('${images[currentIndex]}')`;
                    bg1.classList.add('active');
                    bg2.classList.remove('active');
                }
                
                isBg1Active = !isBg1Active;
            }, 10000);
        }

        function initParallax() {
            let targetX = 0, targetY = 0;
            let currentX = 0, currentY = 0;

            document.addEventListener('mousemove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 30;
                targetY = (e.clientY / window.innerHeight - 0.5) * 30;
            });

            function animate() {
                currentX += (targetX - currentX) * 0.04;
                currentY += (targetY - currentY) * 0.04;
                
                bg1.style.transform = `translate(${currentX}px, ${currentY}px)`;
                bg2.style.transform = `translate(${currentX}px, ${currentY}px)`;

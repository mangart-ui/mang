<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mang</title>
    <link rel="icon" href="favicon.png">
    
    <!-- 타이포그래피 전문 폰트(Syne) 및 픽셀 도트(DotGothic16) 장착 -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=DotGothic16&family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #040406;
            --accent-neon: #00f0ff; /* 네온 블루 */
            --accent-purple: #7f00ff; /* 네온 퍼플 */
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 🎬 [업그레이드] 3초 기하학적 추상 그래픽 오프닝 화면 */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            animation: fadeOutScreen 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 2.6s; /* 정확히 3초 바인딩 연출 */
        }

        /* 기하학적 조립 도형 코어 */
        .geo-loader {
            position: relative;
            width: 80px;
            height: 80px;
            transform: rotate(45deg); /* 마름모 형태 배치 */
            animation: geoRotate 2.5s cubic-bezier(0.68, -0.6, 0.32, 1.6) infinite;
        }

        .geo-loader::before, .geo-loader::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--accent-neon);
            box-shadow: 0 0 15px var(--accent-neon);
            animation: geoPulse 1.2s ease-in-out infinite alternate;
        }

        .geo-loader::after {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px var(--accent-purple);
            transform: scale(0.6) rotate(45deg);
            animation-delay: 0.6s;
        }

        @keyframes geoRotate {
            0% { transform: rotate(45deg) scale(0.8); }
            50% { transform: rotate(225deg) scale(1.2); }
            100% { transform: rotate(405deg) scale(0.8); }
        }

        @keyframes geoPulse {
            0% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes fadeOutScreen {
            to { opacity: 0; visibility: hidden; transform: scale(1.1); }
        }

        /* 🖼️ 배경: 서서히 확대 + 앵글 무빙 */
        .bg-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            will-change: transform, opacity;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .bg-animate {
            animation: kenBurns 45s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.02) translate(0%, 0%) rotate(0deg); }
            100% { transform: scale(1.12) translate(-2%, -1%) rotate(0.3deg); }
        }

        /* 🕶️ 오버레이: 부드럽고 어두운 베이스 필터 */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(4, 4, 6, 0.5) 0%,
                rgba(8, 4, 12, 0.75) 50%,
                rgba(4, 4, 6, 0.9) 100%
            );
            z-index: 3;
            pointer-events: none;
        }

        /* 💜 [복구] 작가님이 요청하신 신비로운 보라색 네온 광채 스팟 */
        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.12) 0%, rgba(0, 0, 0, 0) 65%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        /* 🎴 하이엔드 단일 레이아웃 컨테이너 */
        .content-card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--glass-border);
            padding: 55px 40px;
            border-radius: 28px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
            
            /* 오프닝 끝나는 시점에 연기처럼 등장하는 인 애니메이션 */
            opacity: 0;
            transform: translateY(30px);
            animation: panelFadeIn 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 2.6s;
        }

        @keyframes panelFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 타이틀 로고 타입 디자인 */
        .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 72px;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 40%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* [수정] 캐릭터 일러스트레이터 깔끔 지정 */
        .bio {
            font-family: 'DotGothic16', sans-serif;
            font-size: 14px;
            color: #75757a;
            margin-bottom: 45px;
            letter-spacing: 1px;
        }

        /* 🟦 [신규] 정사각형 그리드 겹침 그룹 */
        .grid-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 기본 가로 3열 배열 */
            gap: 16px;
            justify-content: center;
        }

        /* 🔗 정사각형 하이엔드 아이콘 단추 디자인 */
        .grid-btn {
            position: relative;
            aspect-ratio: 1 / 1; /* 가로세로 1:1 완벽한 정사각형 유지 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: #b5b5bd;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 4번째, 5번째 단추를 중앙 밸런스 배치하기 위한 그리드 제어 */
        .grid-btn:nth-child(4) { grid-column: calc(1); }
        .grid-btn:nth-child(5) { grid-column: calc(2); }

        /* 💡 마우스 호버 정사각형 발광 매커니즘 */
        .grid-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-neon);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.15), 0 0 15px rgba(0, 240, 255, 0.1);
        }

        /* 화살표 아이콘 장식 */
        .grid-btn .arrow {
            margin-top: 8px;
            font-size: 11px;
            opacity: 0.3;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .grid-btn:hover .arrow {
            opacity: 1;
            color: var(--accent-neon);
            transform: scale(1.2);
        }

        /* 📱 모바일 디스플레이 2열 교차 자동 밸런싱 */
        @media (max-width: 480px) {
            .content-card {
                padding: 45px 24px;
            }
            .name { font-size: 58px; }
            .grid-nav {
                grid-template-columns: repeat(2, 1fr); /* 모바일은 2열 배열로 안정화 */
            }
            .grid-btn:nth-child(4) { grid-column: auto; }
            .grid-btn:nth-child(5) { grid-column: auto; }
        }
    </style>
</head>

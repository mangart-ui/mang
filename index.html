.link-stage::before,.link-stage::after { content:""; position:absolute; inset:0; pointer-events:none; }.link-stage::before { background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.025) 3px 4px); }.link-stage::after { background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(215,255,79,.18),transparent 24%); }
.link-stage.show { opacity:1; visibility:visible; }.stage-flash { position:absolute; top:0; left:0; width:12px; height:12px; border-radius:50%; background:var(--accent); transform:translate(var(--x,0),var(--y,0)) scale(0); opacity:0; }.link-stage.show .stage-flash { animation:signal-burst .9s cubic-bezier(.16,1,.3,1) both; }
@keyframes signal-burst { 0% { opacity:1; transform:translate(var(--x,0),var(--y,0)) scale(0); } 38% { opacity:.95; } 100% { opacity:0; transform:translate(var(--x,0),var(--y,0)) scale(140); } }

@keyframes orbit-in { from { opacity:0; transform:scale(.2) rotate(-30deg); } to { opacity:1; transform:scale(1) rotate(0); } } @keyframes spin { to { transform:rotate(360deg); } } @keyframes spin-reverse { to { transform:rotate(-360deg); } }
.stage-geometry { position:absolute; inset:0; overflow:hidden; pointer-events:none; }.geo { position:absolute; opacity:0; }.geo-frame { top:17%; left:13%; width:min(37vw,430px); aspect-ratio:1; border:2px solid rgba(245,243,237,.48); }.geo-box { right:11%; bottom:13%; width:min(22vw,235px); aspect-ratio:1; border:1px solid var(--accent); }.geo-triangle { top:18%; right:16%; width:92px; aspect-ratio:1; border:1px solid rgba(245,243,237,.62); clip-path:polygon(50% 0,100% 100%,0 100%); }.geo-ring { bottom:16%; left:25%; width:108px; aspect-ratio:1; border:2px dashed var(--accent); border-radius:50%; }.geo-dot { width:17px; aspect-ratio:1; border-radius:50%; background:var(--accent); box-shadow:0 0 30px rgba(215,255,79,.8); }.dot-a { top:28%; left:28%; }.dot-b { right:27%; bottom:31%; background:var(--white); box-shadow:0 0 26px rgba(245,243,237,.65); }.dot-c { top:63%; left:17%; width:9px; }.link-stage.show .geo-frame { animation:frame-drift 8s .12s ease-in-out infinite alternate,geo-in .7s .08s both; }.link-stage.show .geo-box { animation:box-drift 7s .22s ease-in-out infinite alternate,geo-in .7s .18s both; }.link-stage.show .geo-triangle { animation:triangle-orbit 10s .1s linear infinite,geo-in .6s .15s both; }.link-stage.show .geo-ring { animation:ring-shift 6s .12s ease-in-out infinite alternate,geo-in .8s .1s both; }.link-stage.show .geo-dot { animation:dot-float 4s ease-in-out infinite alternate,geo-in .4s both; }.link-stage.show .dot-b { animation-delay:.24s,.17s; }.link-stage.show .dot-c { animation-delay:.5s,.25s; } @keyframes geo-in { from { opacity:0; } to { opacity:1; } } @keyframes frame-drift { to { transform:translate(17vw,10vh) rotate(67deg) scale(.8); } } @keyframes box-drift { to { transform:translate(-15vw,-13vh) rotate(-145deg) scale(1.4); } } @keyframes triangle-orbit { to { transform:rotate(360deg) translateX(70px) rotate(-360deg); } } @keyframes ring-shift { to { transform:translate(33vw,-26vh) rotate(260deg) scale(1.65); } } @keyframes dot-float { to { transform:translate(10vw,-15vh) scale(1.7); } }

or:#080808; background:var(--accent); font-size:11px; letter-spacing:.08em; text-decoration:none; transition:transform .2s,box-shadow .2s; }.stage-open:hover,.stage-open:focus-visible { outline:0; transform:translateY(-4px); box-shadow:0 7px 0 var(--white); }.stage-open i { font:normal 25px/0 "Manrope",sans-serif; }.stage-close { margin-top:24px; border:0; padding:8px; background:transparent; color:var(--dim); font:10px "DM Mono",monospace; cursor:pointer; }.stage-close:hover { color:var(--white); }
.link-stage.loading .stage-open,.link-stage.loading .stage-close { display:none; }.link-stage.loading .stage-note { margin-bottom:0; }.link-stage.loading .stage-content h2 { font-size:clamp(37px,8vw,63px); }
.link-stage.loading .geo-frame { animation:load-frame 1.1s .05s cubic-bezier(.16,1,.3,1) infinite both; }.link-stage.loading .geo-box { animation:load-box .82s .18s cubic-bezier(.16,1,.3,1) infinite both; }.link-stage.loading .geo-triangle { animation:load-triangle 1.28s .08s cubic-bezier(.16,1,.3,1) infinite both; }.link-stage.loading .geo-ring { animation:load-ring .96s .32s cubic-bezier(.16,1,.3,1) infinite both; }.link-stage.loading .dot-a { animation:load-dot .55s .08s ease-in-out infinite both; }.link-stage.loading .dot-b { animation:load-dot .68s .27s ease-in-out infinite both; }.link-stage.loading .dot-c { animation:load-dot .46s .18s ease-in-out infinite both; }.link-stage.loading .orbit-one { animation:load-orbit 1.5s linear infinite; }.link-stage.loading .orbit-two { animation:load-orbit-reverse .9s linear infinite; } @keyframes load-frame { 0%,100% { opacity:0; transform:translate(-16vw,-12vh) rotate(-28deg) scale(.35); } 35% { opacity:.8; } 62% { opacity:.2; transform:translate(14vw,13vh) rotate(53deg) scale(1.18); } }.link-stage.loading .geo-box { opacity:0; } @keyframes load-box { 0%,100% { opacity:0; transform:translate(14vw,15vh) rotate(72deg) scale(.25); } 42% { opacity:1; } 74% { opacity:.15; transform:translate(-17vw,-13vh) rotate(-120deg) scale(1.55); } } @keyframes load-triangle { 0%,100% { opacity:0; transform:translate(7vw,-16vh) rotate(-45deg) scale(.2); } 38% { opacity:.95; } 70% { opacity:.1; transform:translate(-22vw,20vh) rotate(225deg) scale(1.8); } } @keyframes load-ring { 0%,100% { opacity:0; transform:translate(-10vw,14vh) scale(.2); } 36% { opacity:.9; } 67% { opacity:.05; transform:translate(28vw,-21vh) rotate(250deg) scale(2); } } @keyframes load-dot { 0%,100% { opacity:0; transform:scale(.1); } 45% { opacity:1; transform:translate(8vw,-9vh) scale(2.2); } 72% { opacity:0; transform:translate(-6vw,11vh) scale(.3); } } @keyframes load-orbit { 0% { opacity:0; transform:scale(.2) rotate(0); } 25% { opacity:.8; } 75% { opacity:.1; } 100% { opacity:0; transform:scale(1.55) rotate(360deg); } } @keyframes load-orbit-reverse { 0% { opacity:0; transform:scale(1.7) rotate(0); } 38% { opacity:.7; } 100% { opacity:0; transform:scale(.15) rotate(-360deg); } }
@media (max-width:760px) { .shell { width:calc(100% - 32px); padding-top:42px; }.intro { width:auto; }.hint { margin-top:28px; }.network { position:relative; top:auto; left:auto; width:100%; height:440px; margin-top:38px; }.node { height:70px; grid-template-columns:34px 47px 1fr 26px; }.node-mark { width:42px; height:42px; font-size:22px; }.node::before { left:34px; }.node-x { left:0; }.node-pixiv { left:5vw; }.node-commission { left:10vw; }.node-ig { left:15vw; }.node-youtube { left:20vw; }.node-pixiv { --top:70px; }.node-commission { --top:140px; }.node-ig { --top:210px; }.node-youtube { --top:280px; } footer { position:relative; bottom:auto; margin-top:12px; } }
body.ready .intro { opacity:1; transform:none; } body.ready .node { opacity:1; transform:none; } body.ready .node-x { transition-delay:.16s; } body.ready .node-pixiv { transition-delay:.29s; } body.ready .node-commission { transition-delay:.42s; } body.ready .node-ig { transition-delay:.55s; } body.ready .node-youtube { transition-delay:.68s; } body.ready footer { opacity:1; transform:none; } body.ready .node:hover,body.ready .node:focus-visible,body.ready .node.active { transform:translateY(-3px); }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }

  <body>
    <!-- 배경 주소는 위 CSS의 --bg-1 ~ --bg-4에서 수정합니다. -->
    <div class="backgrounds" aria-hidden="true">
      <div class="background bg-1"></div><div class="background bg-2"></div>
      <div class="background bg-3"></div><div class="background bg-4"></div>
    </div>
    <div class="veil" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <main class="shell">
      <section class="intro">
        <p class="index">01—05</p>
        <div class="intro-line"></div>
        <p class="hello">digital sketchbook</p>
        <h1>MANG<span>_</span></h1>
        <p class="about">Character illustrator</p>
        <p class="hint">choose a signal <span>↓</span></p>
      </section>

      <section class="network" aria-label="내 링크">
        <!-- data-url, data-label, data-note를 본인 링크에 맞게 수정하세요. -->
        <button class="node node-x" type="button" data-url="https://x.com/KRIMP1723322" data-label="X / Twitter" data-note="tiny thoughts & updates">
          <span class="node-number">01</span><span class="node-mark">𝕏</span><span class="node-copy"><b>X / Twitter</b><small>tiny thoughts & updates</small></span><span class="node-go">↗</span>
        </button>
        <button class="node node-pixiv" type="button" data-url="https://www.pixiv.net/users/YOUR_ID" data-label="Pixiv" data-note="illustration archive">
          <span class="node-number">02</span><span class="node-mark">P</span><span class="node-copy"><b>Pixiv</b><small>illustration archive</small></span><span class="node-go">↗</span>
        </button>
        <button class="node node-commission" type="button" data-url="https://YOUR-COMMISSION-LINK.example" data-label="Commission" data-note="slots & pricing">
          <span class="node-number">03</span><span class="node-mark">✦</span><span class="node-copy"><b>Commission</b><small>slots & pricing</small></span><span class="node-go">↗</span>
        </button>
        <button class="node node-ig" type="button" data-url="https://instagram.com/YOUR_ID" data-label="Instagram" data-note="drawings in progress">
          <span class="node-number">04</span><span class="node-mark">◎</span><span class="node-copy"><b>Instagram</b><small>drawings in progress</small></span><span class="node-go">↗</span>
        </button>
        <button class="node node-youtube" type="button" data-url="https://www.youtube.com/@mangryeong-s1h" data-label="YouTube" data-note="videos & process">
          <span class="node-number">05</span><span class="node-mark">▶</span><span class="node-copy"><b>YouTube</b><small>videos & process</small></span><span class="node-go">↗</span>
        </button>
      </section>

      <footer><span>© 2026 MANG</span><span>all signals received</span></footer>
    </main>
    <section class="link-stage" aria-live="polite" aria-hidden="true">
      <div class="stage-flash"></div>
      <div class="stage-orbit orbit-one"></div><div class="stage-orbit orbit-two"></div>
      <div class="stage-geometry" aria-hidden="true">
        <i class="geo geo-frame"></i><i class="geo geo-box"></i><i class="geo geo-triangle"></i><i class="geo geo-ring"></i>
        <i class="geo geo-dot dot-a"></i><i class="geo geo-dot dot-b"></i><i class="geo geo-dot dot-c"></i>
      </div>
      <p class="stage-status">establishing signal <span></span></p>
      <div class="stage-content">
        <p class="stage-count">LINK READY / <span>00</span></p>
        <h2></h2>
        <p class="stage-note"></p>
        <a class="stage-open" href="#"><span>OPEN DESTINATION</span><i>↗</i></a>
        <button class="stage-close" type="button">esc / back</button>
      </div>
    </section>
    <div class="cursor-label" aria-hidden="true">open</div>
    <script>
const nodes = document.querySelectorAll('.node');
const cursor = document.querySelector('.cursor-label');
const stage = document.querySelector('.link-stage');
const stageTitle = document.querySelector('.stage-content h2');
const stageNote = document.querySelector('.stage-note');
const stageCount = document.querySelector('.stage-count span');
const stageOpen = document.querySelector('.stage-open');
const stageClose = document.querySelector('.stage-close');
const stageStatus = document.querySelector('.stage-status');
const titleTones = ['tone-x', 'tone-pixiv', 'tone-commission', 'tone-instagram', 'tone-youtube'];

function closeStage() {
  stage.classList.remove('show');
  stage.setAttribute('aria-hidden', 'true');
}

nodes.forEach((node, index) => {
  node.addEventListener('click', (event) => {
    nodes.forEach((item) => item.classList.remove('active'));
    node.classList.add('active');
    stage.style.setProperty('--x', `${event.clientX}px`);
    stage.style.setProperty('--y', `${event.clientY}px`);
    stageTitle.textContent = node.dataset.label;
    stageNote.textContent = node.dataset.note;
    stageCount.textContent = String(index + 1).padStart(2, '0');
    stageStatus.innerHTML = 'establishing signal <span></span>';
    stage.classList.remove(...titleTones);
    stage.classList.add(titleTones[index]);
    stageOpen.href = node.dataset.url;
    stage.classList.remove('show');
    void stage.offsetWidth; // 클릭할 때마다 시작점에서 버스트를 다시 재생합니다.
    stage.classList.add('show');
    stage.setAttribute('aria-hidden', 'false');
  });
});

stageClose.addEventListener('click', closeStage);
document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeStage(); });
window.addEventListener('pointermove', (event) => {
  cursor.style.left = `${event.clientX}px`;
  cursor.style.top = `${event.clientY}px`;
});
document.querySelector('.network').addEventListener('pointerenter', () => document.body.classList.add('has-pointer'));
document.querySelector('.network').addEventListener('pointerleave', () => document.body.classList.remove('has-pointer'));

// index.html을 열 때만 재생되는 시작 로딩 연출입니다. 링크 클릭 효과는 그대로 유지됩니다.
stage.style.setProperty('--x', '50vw');
stage.style.setProperty('--y', '50vh');
stage.classList.remove(...titleTones);
stageTitle.textContent = 'SIGNAL / ON';
stageNote.textContent = 'loading your little universe';
stageCount.textContent = '00';
stageStatus.innerHTML = 'initializing space <span></span>';
stage.classList.add('loading', 'show');
stage.setAttribute('aria-hidden', 'false');
window.setTimeout(() => {
  stage.classList.remove('loading');
  closeStage();
  document.body.classList.add('ready');
}, 2500);

    </script>
  </body>
</html>
